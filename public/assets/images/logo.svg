<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <!-- Purple gradient matching var(--primary) hsl(262,80%,55%) -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b3cf7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Inner glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="160" height="160" rx="36" fill="url(#g)"/>

  <!-- Network nodes (social connectivity motif) -->
  <!-- Node 1 – top-left -->
  <circle cx="44"  cy="44"  r="10" fill="rgba(255,255,255,0.25)"/>
  <!-- Node 2 – top-right -->
  <circle cx="116" cy="44"  r="10" fill="rgba(255,255,255,0.25)"/>
  <!-- Node 3 – bottom-left -->
  <circle cx="44"  cy="116" r="10" fill="rgba(255,255,255,0.25)"/>
  <!-- Node 4 – bottom-right -->
  <circle cx="116" cy="116" r="10" fill="rgba(255,255,255,0.25)"/>

  <!-- Connection lines (diagonal N shape) -->
  <line x1="44"  y1="44"  x2="44"  y2="116" stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round"/>
  <line x1="116" y1="44"  x2="116" y2="116" stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round"/>
  <line x1="44"  y1="44"  x2="116" y2="116" stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round"/>

  <!-- Large "N" letter – primary brand letter -->
  <text x="80" y="108"
        font-family="'Inter', 'Arial Black', Arial, sans-serif"
        font-size="80"
        font-weight="900"
        fill="#ffffff"
        filter="url(#glow)"
        text-anchor="middle"
        dominant-baseline="auto"
        letter-spacing="-3">N</text>
</svg>
